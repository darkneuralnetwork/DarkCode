<div class="cognition-layout custom-scrollbar" style="display: flex; flex-direction: column; width: 100%; height: 100%; overflow-y: auto; background: var(--bg-void); padding: 24px;">

  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
    <h2 class="gradient-text" style="margin: 0; font-size: 24px;">Cognition</h2>
  </div>

  <!-- TOP ROW: Projects & Project Intelligence -->
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px;">
    
    <!-- Projects -->
    <div class="glass-panel" id="cog-projects-panel" style="padding: 20px; display: flex; flex-direction: column;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <h3 class="cfg-h3" style="margin: 0; font-size: 14px; text-transform: uppercase;">📁 Project Workspace</h3>
        <div style="display: flex; gap: 8px;">
          <button class="btn-glow" id="proj-refresh" style="padding: 4px 10px; font-size: 11px;">Reload</button>
          <button class="btn-glow primary" id="proj-new" style="padding: 4px 10px; font-size: 11px;">+ New</button>
          <button class="fe-btn max-btn" data-target="cog-projects-panel">⛶</button>
        </div>
      </div>
      <div class="proj-grid" id="proj-grid" style="flex: 1;"></div>
    </div>

    <!-- Intelligence KPIs -->
    <div class="glass-panel" id="cog-intelligence-panel" style="padding: 20px; display: flex; flex-direction: column;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <h3 class="cfg-h3" style="margin: 0; font-size: 14px; text-transform: uppercase;">🔬 Project Intelligence</h3>
        <div style="display: flex; gap: 8px; align-items: center;">
          <span class="evt-live" id="intel-live">● SYNCED</span>
          <button class="fe-btn max-btn" data-target="cog-intelligence-panel">⛶</button>
        </div>
      </div>
      <div class="kpi-row" id="intel-kpi" style="margin-bottom: 16px;">
        <div class="kpi-card">
          <div class="kpi-icon">📄</div>
          <div class="kpi-body">
            <div class="kpi-label">Indexed Files</div>
            <div class="kpi-value" id="intel-files">0</div>
            <div class="kpi-sub" id="intel-files-sub">0 pending</div>
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon">🔤</div>
          <div class="kpi-body">
            <div class="kpi-label">Symbols</div>
            <div class="kpi-value" id="intel-symbols">0</div>
            <div class="kpi-sub"><span id="intel-funcs">0</span> fn · <span id="intel-classes">0</span> cls</div>
          </div>
        </div>
      </div>
      <div id="intel-deps" class="intel-deps-grid" style="flex: 1; border: 1px solid rgba(255,255,255,0.05); padding: 12px; border-radius: 6px;">
        <div class="mem-empty">No dependency data available.</div>
      </div>
    </div>

  </div>

  <!-- MIDDLE ROW: Memory & Knowledge Graph -->
  <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px;">

    <!-- 4-Tier Memory -->
    <div class="glass-panel" id="cog-memory-panel" style="padding: 20px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <h3 class="cfg-h3" style="margin: 0; font-size: 14px; text-transform: uppercase;">🧠 6-Tier Cognitive Architecture</h3>
        <div style="display: flex; gap: 8px;">
          <button class="btn-glow" id="mem-refresh" style="padding: 4px 10px; font-size: 11px;">Sync Memory</button>
          <button class="fe-btn max-btn" data-target="cog-memory-panel">⛶</button>
        </div>
      </div>
      <div class="mem-grid" id="mem-grid" style="grid-template-columns: 1fr 1fr; grid-auto-rows: minmax(100px, auto);">
        <div class="mem-card glass-panel" data-type="conversation">
          <div class="mem-card-head"><div class="mc-title"><span class="mc-icon">💬</span> <h3>Conversation</h3></div></div>
          <div class="mem-card-body custom-scrollbar" id="mem-conversation"></div>
        </div>
        <div class="mem-card glass-panel" data-type="session">
          <div class="mem-card-head"><div class="mc-title"><span class="mc-icon">⚡</span> <h3>Session</h3></div></div>
          <div class="mem-card-body custom-scrollbar" id="mem-session"></div>
        </div>
        <div class="mem-card glass-panel" data-type="project">
          <div class="mem-card-head"><div class="mc-title"><span class="mc-icon">📁</span> <h3>Project</h3></div></div>
          <div class="mem-card-body custom-scrollbar" id="mem-project"></div>
        </div>
        <div class="mem-card glass-panel" data-type="workspace">
          <div class="mem-card-head"><div class="mc-title"><span class="mc-icon">🏢</span> <h3>Workspace</h3></div></div>
          <div class="mem-card-body custom-scrollbar" id="mem-workspace"></div>
        </div>
        <div class="mem-card glass-panel" data-type="user">
          <div class="mem-card-head"><div class="mc-title"><span class="mc-icon">👤</span> <h3>User</h3></div></div>
          <div class="mem-card-body custom-scrollbar" id="mem-user"></div>
        </div>
        <div class="mem-card glass-panel" data-type="architecture">
          <div class="mem-card-head"><div class="mc-title"><span class="mc-icon">🏛️</span> <h3>Architecture</h3></div></div>
          <div class="mem-card-body custom-scrollbar" id="mem-architecture"></div>
        </div>
      </div>
    </div>

    <!-- Knowledge Graph -->
    <div class="glass-panel" id="cog-kg-panel" style="padding: 20px; display: flex; flex-direction: column;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <h3 class="cfg-h3" style="margin: 0; font-size: 14px; text-transform: uppercase;">🕸️ Graph Entities</h3>
        <div style="display: flex; gap: 8px;">
          <button class="btn-glow" id="kg-refresh" style="padding: 4px 10px; font-size: 11px;">Reload</button>
          <button class="fe-btn max-btn" data-target="cog-kg-panel">⛶</button>
        </div>
      </div>
      <div class="kg-container custom-scrollbar" style="flex: 1; border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; overflow-y: auto; display: flex; flex-direction: column;">
        <div class="kg-split" style="height: 100%; display: flex; flex-direction: column;">
          <div class="kg-list custom-scrollbar" id="kg-nodes" style="border:none; padding: 12px; flex: 1; min-height: 0; overflow-y: auto;"></div>
          <div class="kg-list custom-scrollbar" id="kg-edges" style="border:none; padding: 12px; border-top: 1px solid rgba(255,255,255,0.05); flex: 1; min-height: 0; overflow-y: auto;"></div>
        </div>
      </div>
    </div>

  </div>
</div>
